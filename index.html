<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRIMA | Decentralized Game Hosting</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030303;
            --card-bg: #0f0f11;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-cyan: #00f0ff;
            --accent-purple: #6d28d9;
            --danger: #ff2a2a;
            --font-main: 'Outfit', sans-serif;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- UTILS --- */
        .hidden { display: none !important; }
        .btn {
            cursor: pointer;
            border: none;
            font-family: var(--font-main);
            font-weight: 600;
            transition: var(--transition);
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(3, 3, 3, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .search-container {
            position: relative;
            width: 300px;
        }

        .search-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px 15px;
            border-radius: 20px;
            color: white;
            font-family: var(--font-main);
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .create-btn {
            background: linear-gradient(135deg, var(--accent-purple), #4c1d95);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .create-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(109, 40, 217, 0.4);
        }

        /* --- MAIN GRID --- */
        main {
            padding: 100px 40px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card-thumb {
            height: 160px;
            width: 100%;
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Dynamic gradient generation via JS will override this inline */

        .play-icon {
            font-size: 40px;
            opacity: 0;
            transform: scale(0.8);
            transition: var(--transition);
            color: white;
            text-shadow: 0 0 10px black;
        }

        .game-card:hover .play-icon {
            opacity: 1;
            transform: scale(1);
        }

        .card-info {
            padding: 15px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: #111;
            width: 500px;
            border-radius: 16px;
            border: 1px solid #333;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            color: #888;
            font-size: 24px;
        }
        .close-modal:hover { color: white; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-input, .form-textarea {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-family: monospace;
        }
        
        .form-textarea {
            height: 150px;
            resize: vertical;
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--accent-purple);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            background: transparent;
            color: #888;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
        }

        .tab-btn.active {
            background: #222;
            color: white;
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-cyan);
            color: black;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            background: #00dbeb;
        }

        .submit-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* --- PLAYER OVERLAY --- */
        .player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 300;
            display: flex;
            flex-direction: column;
        }

        .player-bar {
            height: 50px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #333;
        }

        .exit-btn {
            background: #333;
            color: white;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 12px;
        }
        .exit-btn:hover { background: var(--danger); }

        .game-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: white; /* Default game bg */
        }

        /* --- LOADER --- */
        .loader-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 240, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-cyan);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #111;
            border-left: 4px solid var(--accent-cyan);
            padding: 15px 25px;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 500;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-left-color: var(--danger); }

    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <div class="status-text" id="loaderText">INITIALIZING SIRIMA CORE...</div>
    </div>

    <!-- Header -->
    <header>
        <div class="logo">SIRIMA</div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search games...">
        </div>
        <button class="btn create-btn" onclick="openModal()">
            <span>+</span> Create Game
        </button>
    </header>

    <!-- Main Grid -->
    <main>
        <div id="gamesGrid" class="games-grid">
            <!-- Games injected here -->
        </div>
        <div id="emptyState" class="hidden" style="text-align: center; margin-top: 100px; color: #555;">
            <h2>No Games Found</h2>
            <p>Be the first to upload a game to the network.</p>
        </div>
    </main>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Upload to Network</div>
                <button class="btn close-modal" onclick="closeModal()">&times;</button>
            </div>
            
            <div class="form-group">
                <label class="form-label">Game Title</label>
                <input type="text" id="gameTitle" class="form-input" placeholder="e.g. Neon Racer">
            </div>

            <div class="tabs">
                <button class="btn tab-btn active" onclick="switchTab('code')">Paste Code</button>
                <button class="btn tab-btn" onclick="switchTab('file')">Upload HTML</button>
            </div>

            <div class="form-group" id="codeInputContainer">
                <label class="form-label">HTML/JS/CSS Code</label>
                <textarea id="gameCode" class="form-textarea" placeholder="<html>...</html>"></textarea>
            </div>

            <div class="form-group hidden" id="fileInputContainer">
                <label class="form-label">Select .html file</label>
                <input type="file" id="gameFile" class="form-input" accept=".html,.htm">
            </div>

            <button id="uploadBtn" class="btn submit-btn" onclick="handleUpload()">DEPLOY TO GIST</button>
        </div>
    </div>

    <!-- Player Overlay -->
    <div id="playerOverlay" class="player-overlay hidden">
        <div class="player-bar">
            <span id="playingTitle" style="font-weight: 600; font-size: 14px;">Playing: Unknown</span>
            <button class="btn exit-btn" onclick="closeGame()">EXIT GAME</button>
        </div>
        <iframe id="gameFrame" class="game-frame" sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-forms"></iframe>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">Action Successful</div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        
        // ⚠️ PASTE YOUR GITHUB CLASSIC TOKEN BELOW ⚠️
        // Ensure it has the 'gist' scope enabled.
        const GITHUB_TOKEN = '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'; 
        
        const GIST_FILENAME = 'games_db.json';
        const STORAGE_KEY = 'sirima_gist_id';

        // ==========================================
        // STATE & DOM ELEMENTS
        // ==========================================
        let gamesData = [];
        let currentGistId = localStorage.getItem(STORAGE_KEY) || null;
        let uploadMode = 'code'; // 'code' or 'file'

        const dom = {
            loader: document.getElementById('loader'),
            loaderText: document.getElementById('loaderText'),
            grid: document.getElementById('gamesGrid'),
            emptyState: document.getElementById('emptyState'),
            modal: document.getElementById('uploadModal'),
            searchInput: document.getElementById('searchInput'),
            playerOverlay: document.getElementById('playerOverlay'),
            gameFrame: document.getElementById('gameFrame'),
            playingTitle: document.getElementById('playingTitle'),
            toast: document.getElementById('toast'),
            uploadBtn: document.getElementById('uploadBtn')
        };

        // ==========================================
        // INITIALIZATION
        // ==========================================
        window.addEventListener('DOMContentLoaded', async () => {
            if (GITHUB_TOKEN === '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' || GITHUB_TOKEN === '') {
                showError("Please edit the HTML file and insert your GitHub Token.");
                dom.loader.classList.add('hidden');
                return;
            }
            await loadGames();
        });

        // ==========================================
        // API LOGIC
        // ==========================================
        
        async function fetchFromApi(url, method = 'GET', body = null) {
            const headers = {
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            };

            const options = { method, headers };
            if (body) options.body = JSON.stringify(body);

            try {
                const response = await fetch(url, options);
                
                if (response.status === 401) throw new Error("Unauthorized: Check your Token.");
                if (response.status === 403) throw new Error("Forbidden: API Rate Limit or Scope issue.");
                if (response.status === 404) return null; // Not found is valid for logic flow
                
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.message || "API Error");
                }

                return await response.json();
            } catch (error) {
                console.error("API Call Failed:", error);
                throw error;
            }
        }

        async function loadGames() {
            dom.loader.classList.remove('hidden');
            
            try {
                if (currentGistId) {
                    // Try to fetch existing Gist
                    const gist = await fetchFromApi(`https://api.github.com/gists/${currentGistId}`);
                    
                    if (gist && gist.files[GIST_FILENAME]) {
                        const content = JSON.parse(gist.files[GIST_FILENAME].content);
                        gamesData = content.games || [];
                    } else {
                        // Gist exists but file missing, or ID invalid
                        localStorage.removeItem(STORAGE_KEY);
                        currentGistId = null;
                        gamesData = [];
                    }
                } else {
                    gamesData = [];
                }
                renderGrid();
            } catch (error) {
                showError(error.message);
                // Reset on critical error to allow retry
                localStorage.removeItem(STORAGE_KEY);
                currentGistId = null;
            } finally {
                dom.loader.classList.add('hidden');
            }
        }

        async function saveGamesToGist(newGameEntry) {
            dom.uploadBtn.disabled = true;
            dom.uploadBtn.innerText = "UPLOADING...";

            try {
                // Add new game to start of array
                gamesData.unshift(newGameEntry);

                const payload = {
                    files: {
                        [GIST_FILENAME]: {
                            content: JSON.stringify({ games: gamesData }, null, 2)
                        }
                    }
                };

                let result;

                if (currentGistId) {
                    // Update existing
                    result = await fetchFromApi(`https://api.github.com/gists/${currentGistId}`, 'PATCH', payload);
                } else {
                    // Create new
                    const creationPayload = {
                        description: "SIRIMA Game Database",
                        public: true, // Public gists are easier for read-only access without auth on client side later if needed
                        files: payload.files
                    };
                    result = await fetchFromApi(`https://api.github.com/gists`, 'POST', creationPayload);
                    
                    // Save new ID
                    currentGistId = result.id;
                    localStorage.setItem(STORAGE_KEY, currentGistId);
                }

                showToast("Game Deployed Successfully!");
                closeModal();
                renderGrid();

            } catch (error) {
                showError("Upload Failed: " + error.message);
            } finally {
                dom.uploadBtn.disabled = false;
                dom.uploadBtn.innerText = "DEPLOY TO GIST";
            }
        }

        // ==========================================
        // UI RENDERING
        // ==========================================

        function renderGrid(filterText = '') {
            dom.grid.innerHTML = '';
            
            const filtered = gamesData.filter(g => 
                g.title.toLowerCase().includes(filterText.toLowerCase())
            );

            if (filtered.length === 0) {
                dom.emptyState.classList.remove('hidden');
            } else {
                dom.emptyState.classList.add('hidden');
                
                filtered.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    
                    // Generate deterministic gradient based on title length
                    const hue = (game.title.length * 20) % 360;
                    const gradient = `linear-gradient(135deg, hsl(${hue}, 60%, 20%), hsl(${hue + 40}, 60%, 10%))`;
                    
                    card.innerHTML = `
                        <div class="card-thumb" style="background: ${gradient}">
                            <div class="play-icon">▶</div>
                        </div>
                        <div class="card-info">
                            <div class="card-title">${escapeHtml(game.title)}</div>
                            <div class="card-meta">
                                <span>${new Date(game.date).toLocaleDateString()}</span>
                                <span>ID: ${game.id.substr(0,6)}</span>
                            </div>
                        </div>
                    `;
                    
                    card.onclick = () => launchGame(game);
                    dom.grid.appendChild(card);
                });
            }
        }

        // ==========================================
        // GAME EXECUTION
        // ==========================================

        function launchGame(game) {
            dom.playingTitle.innerText = `Playing: ${game.title}`;
            dom.playerOverlay.classList.remove('hidden');
            
            // Use srcdoc for sandboxing
            dom.gameFrame.srcdoc = game.code;
        }

        function closeGame() {
            dom.playerOverlay.classList.add('hidden');
            dom.gameFrame.srcdoc = ''; // Clear memory
        }

        // ==========================================
        // UPLOAD LOGIC
        // ==========================================

        function openModal() {
            dom.modal.classList.add('active');
            // Reset fields
            document.getElementById('gameTitle').value = '';
            document.getElementById('gameCode').value = '';
            document.getElementById('gameFile').value = '';
        }

        function closeModal() {
            dom.modal.classList.remove('active');
        }

        function switchTab(mode) {
            uploadMode = mode;
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'code') {
                document.getElementById('codeInputContainer').classList.remove('hidden');
                document.getElementById('fileInputContainer').classList.add('hidden');
            } else {
                document.getElementById('codeInputContainer').classList.add('hidden');
                document.getElementById('fileInputContainer').classList.remove('hidden');
            }
        }

        async function handleUpload() {
            const title = document.getElementById('gameTitle').value.trim();
            let code = '';

            // Validation
            if (!title) return showError("Title is required");

            if (uploadMode === 'code') {
                code = document.getElementById('gameCode').value;
                if (code.length < 10) return showError("Code is too short (min 10 chars)");
                processUpload(title, code);
            } else {
                const fileInput = document.getElementById('gameFile');
                if (fileInput.files.length === 0) return showError("Please select a file");
                
                const file = fileInput.files[0];
                const reader = new FileReader();
                
                dom.uploadBtn.innerText = "READING FILE...";
                dom.uploadBtn.disabled = true;

                reader.onload = (e) => {
                    processUpload(title, e.target.result);
                };
                reader.onerror = () => showError("Error reading file");
                reader.readAsText(file);
            }
        }

        function processUpload(title, code) {
            const newGame = {
                id: crypto.randomUUID(),
                title: title,
                code: code,
                date: new Date().toISOString(),
                author: "Anonymous" // Could be expanded later
            };
            saveGamesToGist(newGame);
        }

        // ==========================================
        // UTILITIES
        // ==========================================

        dom.searchInput.addEventListener('input', (e) => {
            renderGrid(e.target.value);
        });

        function showToast(msg, isError = false) {
            dom.toast.innerText = msg;
            dom.toast.className = isError ? 'toast show error' : 'toast show';
            setTimeout(() => {
                dom.toast.classList.remove('show');
            }, 3000);
        }

        function showError(msg) {
            showToast(msg, true);
            console.error(msg);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

    </script>
</body>
</html>
